<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <title>治理提案 — Crypto3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../indicators/css/common.css">
  <style>
    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-secondary); text-decoration: none; margin-bottom: 20px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-secondary); transition: all 0.2s; }
    .back-btn:hover { color: var(--text-primary); border-color: var(--border-hover); }
    .detail-header { margin-bottom: 24px; }
    .detail-title { font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .detail-subtitle { font-size: 13px; color: var(--text-tertiary); }
    .detail-stats { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
    .detail-stat { font-size: 13px; padding: 4px 12px; border-radius: 8px; }
    .detail-stat.active { background: var(--accent-dim); color: var(--accent); }
    .detail-stat.passed { background: var(--blue-dim); color: var(--blue); }
    .detail-stat.tev { background: var(--danger-dim); color: var(--danger); }

    .section-label { font-size: 16px; font-weight: 600; color: var(--text-primary); margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .section-label .count { font-size: 13px; font-weight: 400; color: var(--text-tertiary); }

    .proposal-list { display: flex; flex-direction: column; gap: 12px; }
    .proposal-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: all 0.2s; }
    .proposal-card:hover { border-color: var(--border-hover); background: var(--bg-tertiary); }
    .proposal-card.tev-related { border-left: 3px solid var(--danger); }
    .proposal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
    .proposal-tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .proposal-source { font-size: 11px; color: var(--text-tertiary); background: var(--bg-tertiary); padding: 2px 8px; border-radius: 8px; }
    .proposal-title { font-size: 15px; font-weight: 500; color: var(--text-primary); line-height: 1.5; margin-bottom: 4px; }
    .proposal-title a { color: inherit; text-decoration: none; }
    .proposal-title a:hover { color: var(--accent); }
    .proposal-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 8px; padding: 8px 12px; background: var(--bg-primary); border-radius: 8px; border-left: 2px solid var(--border); }
    .s-en { display: none; }
    .proposal-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .proposal-meta span { font-size: 12px; color: var(--text-tertiary); }
    .status-badge { padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 500; }
    .status-badge.active { background: var(--accent-dim); color: var(--accent); }
    .status-badge.passed { background: var(--blue-dim); color: var(--blue); }
    .tev-badge { background: var(--danger-dim); color: var(--danger); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 8px; }
    .show-more-btn { text-align: center; padding: 12px; color: var(--accent); font-size: 14px; cursor: pointer; border: 1px dashed var(--border); border-radius: 8px; margin-top: 12px; transition: all 0.2s; }
    .show-more-btn:hover { background: var(--accent-dim); border-color: var(--accent); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="../" class="logo">
          <img src="../logo.svg" alt="3D" class="logo-icon">
          <span class="logo-text">Crypto3D</span>
        </a>
        <div class="nav-links">
          <a href="../">首页</a>
          <a href="../tev/" style="color:var(--text-primary);">TEV</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <a class="back-btn" href="./">← 返回协议列表</a>
      <div class="detail-header">
        <div class="detail-title" id="detail-title">加载中...</div>
        <div class="detail-subtitle" id="detail-subtitle"></div>
        <div class="detail-stats" id="detail-stats"></div>
      </div>
      <div id="content"><div class="empty-state">加载中...</div></div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const protocolName = decodeURIComponent(params.get('name') || '');

    if (!protocolName) {
      window.location.href = './';
    }

    document.title = protocolName + ' 治理提案 — Crypto3D';

    function fmtDate(ts) {
      if (!ts) return '';
      if (typeof ts === 'number' && ts > 0) return new Date(ts*1000).toLocaleDateString('zh-CN');
      if (typeof ts === 'string') return ts.substring(0,10);
      return '';
    }
    function fmtEnd(end) {
      if (!end) return '';
      if (typeof end === 'number' && end > 0) {
        const h = Math.round((new Date(end*1000) - new Date()) / 3600000);
        if (h > 0 && h < 168) return '⏰ ' + h + 'h 后截止';
        if (h > 0) return '截止: ' + new Date(end*1000).toLocaleDateString('zh-CN');
      }
      if (typeof end === 'string' && end.length > 0) return '截止: ' + end.substring(0,10);
      return '';
    }

    function toggleMore(id) {
      const el = document.getElementById(id);
      const btn = el.nextElementSibling;
      if (el.style.display === 'none') {
        el.style.display = 'block';
        btn.textContent = '收起';
      } else {
        el.style.display = 'none';
        btn.textContent = '展开更多 (' + el.children.length + ')';
      }
    }

    function renderProposal(p) {
      const sc = p.status === 'active' ? 'active' : 'passed';
      const statusText = p.status === 'active' ? '进行中' : '已通过';
      return `
        <div class="proposal-card ${p.tev_related ? 'tev-related' : ''}">
          <div class="proposal-header">
            <div class="proposal-tags">
              <span class="proposal-source">${p.source}</span>
              ${p.tev_related ? '<span class="tev-badge">⚠️ TEV</span>' : ''}
            </div>
            <span class="status-badge ${sc}">${statusText}</span>
          </div>
          <div class="proposal-title">
            <a href="${p.link}" target="_blank" rel="noopener">${p.title.replace(/^#\s*/,'').substring(0,150)}</a>
          </div>
          ${p.summary_zh || p.summary_en ? `
            <div class="proposal-summary">
              <span class="s-zh">${(p.summary_zh || p.summary_en || '').substring(0,300)}</span>
              <span class="s-en" style="display:none">${(p.summary_en || '').substring(0,300)}</span>
            </div>` : ''}
          <div class="proposal-meta">
            ${fmtDate(p.created) ? `<span>📅 ${fmtDate(p.created)}</span>` : ''}
            ${fmtEnd(p.end) ? `<span>${fmtEnd(p.end)}</span>` : ''}
            ${p.tev_keywords && p.tev_keywords.length ? `<span style="color:var(--danger)">关键词: ${p.tev_keywords.join(', ')}</span>` : ''}
          </div>
        </div>`;
    }

    function renderSection(label, emoji, proposals, sectionId) {
      if (!proposals.length) return '';
      const show = proposals.slice(0, 5);
      const more = proposals.slice(5);
      let html = `<div class="section-label">${emoji} ${label} <span class="count">(${proposals.length})</span></div>`;
      html += '<div class="proposal-list">';
      html += show.map(renderProposal).join('');
      if (more.length) {
        html += `<div id="${sectionId}" style="display:none">${more.map(renderProposal).join('')}</div>`;
        html += `<div class="show-more-btn" onclick="toggleMore('${sectionId}')">展开更多 (${more.length})</div>`;
      }
      html += '</div>';
      return html;
    }

    async function loadData() {
      try {
        const resp = await fetch('../data/governance.json');
        const data = await resp.json();

        const proposals = data.proposals.filter(p => p.protocol === protocolName);
        
        // Sort: TEV first, then by time
        const sortFn = (a, b) => {
          if (a.tev_related !== b.tev_related) return a.tev_related ? -1 : 1;
          const ta = typeof a.created === 'number' ? a.created : 0;
          const tb = typeof b.created === 'number' ? b.created : 0;
          return tb - ta;
        };

        const active = proposals.filter(p => p.status === 'active').sort(sortFn);
        const passed = proposals.filter(p => p.status === 'passed').sort(sortFn);
        const tevCount = proposals.filter(p => p.tev_related).length;
        const sources = [...new Set(proposals.map(p => p.source))];

        document.getElementById('detail-title').textContent = protocolName;
        document.getElementById('detail-subtitle').textContent = 
          `${proposals.length} 个提案 · 数据源: ${sources.join(', ') || '—'}`;
        
        document.getElementById('detail-stats').innerHTML = `
          ${active.length ? `<span class="detail-stat active">${active.length} 进行中</span>` : ''}
          ${passed.length ? `<span class="detail-stat passed">${passed.length} 已通过</span>` : ''}
          ${tevCount ? `<span class="detail-stat tev">⚠️ ${tevCount} TEV 相关</span>` : ''}
        `;

        let html = '';
        html += renderSection('进行中', '🔵', active, 'more-active');
        html += renderSection('已通过', '✅', passed, 'more-passed');
        
        if (!active.length && !passed.length) {
          html = '<div class="empty-state">暂无提案数据</div>';
        }

        document.getElementById('content').innerHTML = html;
      } catch(e) {
        document.getElementById('content').innerHTML = '<div class="empty-state">数据加载失败</div>';
      }
    }

    loadData();
  </script>
</body>
</html>
