<!DOCTYPE html>
<html>
<body>
<h1>Test protoData loading</h1>
<div id="result">Loading...</div>
<script>
const pid = 'sky';
fetch('../data/all-protocols.json')
  .then(r => r.json())
  .then(d => {
    const p = d.protocols[pid];
    document.getElementById('result').innerHTML = `
      <p>tevRatio: ${p.tevRatio}</p>
      <p>earning_yield_percent: ${p.earning_yield_percent}</p>
      <p>tev_yield_percent: ${p.tev_yield_percent}</p>
      <p>market_cap_usd: ${p.market_cap_usd}</p>
    `;
  })
  .catch(e => {
    document.getElementById('result').textContent = 'Error: ' + e;
  });
</script>
</body>
</html>
