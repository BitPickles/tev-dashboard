<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Debug - TEV Dashboard</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
    .card { border: 1px solid #ddd; padding: 20px; margin: 20px 0; border-radius: 8px; }
    .field { margin: 10px 0; }
    .label { font-weight: bold; }
    .value { margin-left: 10px; }
    .error { color: red; }
    .success { color: green; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>TEV Dashboard Final Debug</h1>
  
  <div class="card">
    <h2>Sky (MakerDAO)</h2>
    <div class="field"><span class="label">TEV Ratio:</span> <span class="value" id="sky-tevratio">Loading...</span></div>
    <div class="field"><span class="label">Market Cap:</span> <span class="value" id="sky-mcap">Loading...</span></div>
    <div class="field"><span class="label">Earning Yield:</span> <span class="value" id="sky-earning">Loading...</span></div>
    <div class="field"><span class="label">TEV Yield:</span> <span class="value" id="sky-tevyield">Loading...</span></div>
  </div>
  
  <div class="card">
    <h2>Hype</h2>
    <div class="field"><span class="label">TEV Ratio:</span> <span class="value" id="hype-tevratio">Loading...</span></div>
    <div class="field"><span class="label">Market Cap:</span> <span class="value" id="hype-mcap">Loading...</span></div>
    <div class="field"><span class="label">Earning Yield:</span> <span class="value" id="hype-earning">Loading...</span></div>
    <div class="field"><span class="label">TEV Yield:</span> <span class="value" id="hype-tevyield">Loading...</span></div>
  </div>
  
  <div class="card">
    <h2>Console Log</h2>
    <pre id="console">Waiting...</pre>
  </div>
  
  <script>
    const log = (msg) => {
      const pre = document.getElementById('console');
      pre.textContent += new Date().toLocaleTimeString() + ' - ' + msg + '\n';
      console.log(msg);
    };
    
    const updateUI = (pid, cfg) => {
      const tevRatio = cfg.tevRatio;
      const marketCap = cfg.market_cap_usd || cfg.tev_data?.market_cap_usd || 0;
      const earningYield = cfg.earning_yield_percent || 0;
      const tevYield = cfg.tev_data?.tev_yield_percent || 0;
      
      log(`${pid}: tevRatio=${tevRatio}, marketCap=${marketCap}, earningYield=${earningYield}, tevYield=${tevYield}`);
      
      let tevRatioDisplay = '—';
      if (typeof tevRatio === 'string') {
        tevRatioDisplay = tevRatio;
      } else if (tevRatio > 0) {
        tevRatioDisplay = (tevRatio * 100).toFixed(0) + '%';
      }
      
      document.getElementById(`${pid}-tevratio`).textContent = tevRatioDisplay;
      document.getElementById(`${pid}-mcap`).textContent = '$' + (marketCap / 1e9).toFixed(2) + 'B';
      document.getElementById(`${pid}-earning`).textContent = earningYield ? earningYield.toFixed(2) + '%' : '—';
      document.getElementById(`${pid}-tevyield`).textContent = tevYield ? tevYield.toFixed(2) + '%' : '—';
    };
    
    ['sky', 'hype'].forEach(async pid => {
      try {
        const resp = await fetch(`data/protocols/${pid}/config.json`);
        if (!resp.ok) throw new Error(`Failed to fetch: ${resp.status}`);
        const cfg = await resp.json();
        updateUI(pid, cfg);
      } catch (e) {
        log(`${pid} Error: ${e.message}`);
        document.getElementById(`${pid}-tevratio`).textContent = 'ERROR';
        document.getElementById(`${pid}-tevratio`).classList.add('error');
      }
    });
  </script>
</body>
</html>
