<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Simple Test</title></head>
<body>
<h1>Simple TEV Test</h1>
<div id="tevRatio">Loading...</div>
<script>
const pid = 'sky';
fetch(`data/protocols/${pid}/config.json`)
  .then(r => r.json())
  .then(cfg => {
    const tevRatio = cfg.tevRatio;
    console.log('cfg.tevRatio:', tevRatio, 'type:', typeof tevRatio);
    
    let display = '—';
    if (typeof tevRatio === 'string') {
      display = tevRatio;
    } else if (tevRatio > 0) {
      display = (tevRatio * 100).toFixed(0) + '%';
    }
    document.getElementById('tevRatio').textContent = 'tevRatio: ' + display;
  })
  .catch(e => {
    document.getElementById('tevRatio').textContent = 'Error: ' + e.message;
  });
</script>
</body>
</html>
