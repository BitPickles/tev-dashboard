<!DOCTYPE html>
<html>
<body>
<h1>Test Fetch</h1>
<div id="result">Loading...</div>
<script>
const pid = 'sky';
fetch('../data/all-protocols.json')
  .then(r => {
    console.log('Response OK:', r.ok, 'Status:', r.status);
    return r.json();
  })
  .then(d => {
    console.log('Keys:', Object.keys(d));
    console.log('Protocols keys:', Object.keys(d.protocols || {}));
    const p = (d.protocols || {})[pid];
    console.log('Protocol data:', p);
    document.getElementById('result').innerHTML = `
      <p>tevRatio: ${p?.tevRatio} (type: ${typeof p?.tevRatio})</p>
      <p>earning_yield_percent: ${p?.earning_yield_percent}</p>
    `;
  })
  .catch(e => {
    console.error('Error:', e);
    document.getElementById('result').textContent = 'Error: ' + e.message;
  });
</script>
</body>
</html>
