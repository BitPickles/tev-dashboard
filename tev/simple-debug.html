<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Simple Debug</title></head>
<body>
<h1>Simple TEV Debug</h1>
<div id="result">Loading...</div>
<script>
const testSky = async () => {
  try {
    const resp = await fetch('data/protocols/sky/config.json');
    const cfg = await resp.json();
    const tevRatio = cfg.tevRatio;
    document.getElementById('result').innerHTML = `
      <h2>Sky</h2>
      <p>tevRatio: <strong>${tevRatio}</strong> (type: ${typeof tevRatio})</p>
      <p>earning_yield_percent: <strong>${cfg.earning_yield_percent}%</strong></p>
      <p>market_cap_usd: <strong>$${(cfg.market_cap_usd / 1e9).toFixed(2)}B</strong></p>
      <hr>
      <h3>Display Logic</h3>
      <p>if (typeof tevRatio === 'string') { display = tevRatio; }</p>
      <p>else if (tevRatio > 0) { display = (tevRatio * 100).toFixed(0) + '%'; }</p>
      <p>else { display = '—'; }</p>
      <hr>
      <p><strong>Result: </strong>${typeof tevRatio === 'string' ? tevRatio : tevRatio > 0 ? (tevRatio * 100).toFixed(0) + '%' : '—'}</p>
    `;
  } catch (e) {
    document.getElementById('result').innerHTML = `<p style="color:red;">Error: ${e.message}</p>`;
  }
};
testSky();
</script>
</body>
</html>
