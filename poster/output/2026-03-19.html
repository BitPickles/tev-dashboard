<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #0a0a0b;
  color: #fafafa;
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Header */
.hdr {
  padding: 30px 50px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 26px;
  font-weight: 700;
}
.logo-ic {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, #3b82f6, #22c55e);
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
.date { color: #71717a; font-size: 16px; }

/* BTC Bar */
.btc-bar {
  margin: 0 50px;
  padding: 16px 24px;
  background: linear-gradient(145deg, #1a1a1d, #141416);
  border-radius: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.btc-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.btc-icon {
  font-size: 28px;
}
.btc-label {
  font-size: 14px;
  color: #71717a;
  font-weight: 500;
}
.btc-price {
  font-size: 28px;
  font-weight: 700;
  color: #f59e0b;
}
.btc-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.btc-chart {
  width: 150px;
  height: 20px;
}
.btc-change {
  font-size: 16px;
  font-weight: 600;
  min-width: 60px;
  text-align: right;
}

/* Content */
.cnt {
  flex: 1;
  padding: 30px 50px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Main Card */
.main-card {
  background: linear-gradient(145deg, #18181b, #0f0f11);
  border-radius: 24px;
  padding: 32px;
  border: 1px solid rgba(255,255,255,0.05);
}
.main-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}
.main-icon {
  font-size: 32px;
}
.main-title {
  font-size: 16px;
  color: #71717a;
  font-weight: 500;
}
.main-value {
  margin-left: auto;
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -1px;
}

/* Progress */
.progress-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}
.progress-bar {
  flex: 1;
  height: 8px;
  background: #27272a;
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}
.progress-status {
  font-size: 14px;
  font-weight: 600;
  min-width: 60px;
}

.main-detail {
  display: flex;
  gap: 32px;
  font-size: 14px;
  color: #a1a1aa;
  margin-bottom: 16px;
}

.main-chart {
  height: 40px;
  margin-bottom: 16px;
}

.main-hint {
  font-size: 14px;
  color: #71717a;
  line-height: 1.5;
  padding-top: 12px;
  border-top: 1px solid #27272a;
}

/* Sub Row */
.sub-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.sub-card {
  background: linear-gradient(145deg, #18181b, #0f0f11);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.05);
}
.sub-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.sub-icon {
  font-size: 22px;
}
.sub-title {
  font-size: 13px;
  color: #71717a;
  font-weight: 500;
}
.sub-val {
  margin-left: auto;
  font-size: 26px;
  font-weight: 700;
}
.sub-chart {
  height: 24px;
  margin-bottom: 8px;
}
.sub-status {
  font-size: 12px;
  font-weight: 500;
}

/* Footer */
.ftr {
  padding: 24px 50px;
  border-top: 1px solid #27272a;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: #71717a;
}
.link {
  color: #3b82f6;
  font-weight: 600;
  font-size: 16px;
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><div class="logo-ic">📊</div>Crypto3D Daily</div>
  <div class="date">Mar 19, 2026</div>
</div>


<div class="btc-bar">
  <div class="btc-left">
    <span class="btc-icon">₿</span>
    <span class="btc-label">BTC/USD</span>
    <span class="btc-price">$71,499</span>
  </div>
  <div class="btc-right">
    <div class="btc-chart"><svg viewBox="0 0 150 20" preserveAspectRatio="none"><polyline fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" points="0,13.6 25,11.8 50,17.0 75,13.2 100,6.0 125,3.0 150,13.2"/><circle cx="150" cy="13.2" r="2.5" fill="#f59e0b"/></svg></div>
    <span class="btc-change" style="color:#22c55e">+0.1%</span>
  </div>
</div>

<div class="cnt">

<div class="main-card">
  <div class="main-header">
    <span class="main-icon">🔥</span>
    <span class="main-title">AHR999</span>
    <span class="main-value" style="color:#22c55e">0.37</span>
  </div>
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" style="width:24.439999999999998%;background:#22c55e"></div></div>
    <span class="progress-status" style="color:#22c55e">抄底区</span>
  </div>
  <div class="main-detail">
    <span>BTC $71,225</span>
    <span>200日成本 $93,199</span>
  </div>
  <div class="main-chart"><svg viewBox="0 0 300 40" preserveAspectRatio="none"><polyline fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" points="0,29.3 50,25.5 100,37.0 150,27.9 200,10.4 250,3.0 300,26.8"/><circle cx="300" cy="26.8" r="2.5" fill="#22c55e"/></svg></div>
  <div class="main-hint">BTC 价格低于 200 日成本线，历史上定投收益显著</div>
</div>

<div class="sub-row">
  <div class="sub-card">
    <div class="sub-head">
      <span class="sub-icon">📈</span>
      <span class="sub-title">MVRV</span>
      <span class="sub-val" style="color:#22c55e">1.31</span>
    </div>
    <div class="sub-chart"><svg viewBox="0 0 140 24" preserveAspectRatio="none"><polyline fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" points="0,21.0 23,19.3 47,18.4 70,11.6 93,3.0 117,5.8 140,17.8"/><circle cx="140" cy="17.8" r="2.5" fill="#22c55e"/></svg></div>
    <div class="sub-status" style="color:#22c55e">合理区</div>
  </div>
  <div class="sub-card">
    <div class="sub-head">
      <span class="sub-icon">⚠️</span>
      <span class="sub-title">BMRI</span>
      <span class="sub-val" style="color:#3b82f6">47.4</span>
    </div>
    <div class="sub-chart"><svg viewBox="0 0 140 24" preserveAspectRatio="none"><polyline fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" points="0,20.2 23,19.9 47,21.0 70,6.6 93,3.0 117,11.2 140,13.4"/><circle cx="140" cy="13.4" r="2.5" fill="#3b82f6"/></svg></div>
    <div class="sub-status" style="color:#3b82f6">中风险</div>
  </div>
</div>
</div>

<div class="ftr">
  <span>每日加密市场晴雨表</span>
  <span class="link">crypto3d.pro</span>
</div>

</body>
</html>
