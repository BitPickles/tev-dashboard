<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Crypto3D Daily</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: #0a0a0b;
      color: #fafafa;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 50px;
      border-bottom: 1px solid #27272a;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 26px;
      font-weight: 700;
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #3b82f6, #22c55e);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .date { color: #71717a; font-size: 18px; }
    
    /* Main */
    .main {
      flex: 1;
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    
    /* 主卡片 */
    .main-card {
      background: linear-gradient(145deg, #18181b 0%, #0f0f11 100%);
      border-radius: 24px;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    /* 副卡片容器 */
    .sub-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    
    /* 副卡片 */
    .sub-card {
      background: linear-gradient(145deg, #18181b 0%, #0f0f11 100%);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .sub-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    /* 卡片标签 */
    .card-label {
      font-size: 15px;
      color: #71717a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .emoji { font-size: 18px; }
    
    /* 数值 */
    .big-value {
      font-size: 80px;
      font-weight: 700;
      letter-spacing: -3px;
      margin: 20px 0 16px;
    }
    .med-value {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    /* 状态颜色 */
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
    .neutral { color: #3b82f6; }
    
    /* 状态标签 */
    .status-tag {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
    }
    .status-tag.positive { background: rgba(34, 197, 94, 0.15); }
    .status-tag.negative { background: rgba(239, 68, 68, 0.15); }
    .status-tag.neutral { background: rgba(59, 130, 246, 0.15); }
    .status-tag.small { font-size: 12px; padding: 4px 10px; }
    
    /* 变化标签 */
    .change-tag {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .change-tag.positive { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
    .change-tag.negative { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    
    /* 详情行 */
    .detail-row {
      display: flex;
      justify-content: space-around;
      margin-top: 30px;
    }
    .detail-item { text-align: center; }
    .detail-label {
      font-size: 13px;
      color: #52525b;
      margin-bottom: 6px;
    }
    .detail-value {
      font-size: 20px;
      font-weight: 600;
      color: #fafafa;
    }
    
    /* 迷你图表 */
    .mini-chart { height: 50px; margin-top: 20px; }
    .mini-chart.small { height: 40px; margin-top: 12px; }
    .mini-chart svg {
      width: 100%;
      height: 100%;
    }
    
    /* Footer */
    .footer {
      padding: 25px 50px;
      border-top: 1px solid #27272a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      color: #71717a;
    }
    .footer-link {
      color: #3b82f6;
      font-weight: 600;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">📊</div>
      Crypto3D Daily
    </div>
    <div class="date">Mar 19, 2026</div>
  </div>
  
  <div class="main">
    
    <div class="main-card">
      <div class="card-label">
        <span class="emoji">🔥</span>
        <span>AHR999 指数</span>
      </div>
      <div class="big-value positive">0.37</div>
      <div class="status-tag positive">抄底区</div>
      <div class="detail-row">
        <div class="detail-item">
          <div class="detail-label">BTC</div>
          <div class="detail-value">$71,225</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">200日成本</div>
          <div class="detail-value">$93,199</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">周变化</div>
          <div class="detail-value positive">+0.7%</div>
        </div>
      </div>
      <div class="mini-chart"><svg viewBox="0 0 200 50" preserveAspectRatio="none">
      <polyline fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="0.0,36.0 33.3,31.5 66.7,45.0 100.0,34.3 133.3,13.7 166.7,5.0 200.0,33.0"/>
      <circle cx="200" cy="33.0" r="3" fill="#22c55e"/>
    </svg></div>
    </div>
    
    <div class="sub-cards">
      
    <div class="sub-card">
      <div class="sub-header">
        <span class="card-label"><span class="emoji">📈</span> MVRV</span>
        <span class="change-tag positive">+1.0%</span>
      </div>
      <div class="med-value positive">1.31</div>
      <span class="status-tag positive small">合理区</span>
      <div class="mini-chart small"><svg viewBox="0 0 200 40" preserveAspectRatio="none">
      <polyline fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="0.0,35.0 33.3,32.2 66.7,30.6 100.0,19.3 133.3,5.0 166.7,9.6 200.0,29.7"/>
      <circle cx="200" cy="29.7" r="3" fill="#22c55e"/>
    </svg></div>
    </div>
    <div class="sub-card">
      <div class="sub-header">
        <span class="card-label"><span class="emoji">⚠️</span> BMRI</span>
        <span class="change-tag positive">+5.4%</span>
      </div>
      <div class="med-value neutral">47.4</div>
      <span class="status-tag neutral small">中性</span>
      <div class="mini-chart small"><svg viewBox="0 0 200 40" preserveAspectRatio="none">
      <polyline fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="0.0,33.7 33.3,33.1 66.7,35.0 100.0,11.0 133.3,5.0 166.7,18.6 200.0,22.4"/>
      <circle cx="200" cy="22.4" r="3" fill="#3b82f6"/>
    </svg></div>
    </div>
    </div>
  </div>
  
  <div class="footer">
    <span>每日加密市场晴雨表</span>
    <span class="footer-link">crypto3d.pro</span>
  </div>
</body>
</html>
