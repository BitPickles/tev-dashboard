<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #0a0a0b;
  color: #fafafa;
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  padding: 40px 60px;
  border-bottom: 1px solid #27272a;
}
.logo {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 28px;
  font-weight: 700;
}
.logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, #3b82f6, #22c55e);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
.date { color: #71717a; font-size: 18px; }
.content {
  flex: 1;
  padding: 60px;
  display: flex;
  flex-direction: column;
  gap: 40px;
}
.main-card {
  background: linear-gradient(145deg, #18181b, #0f0f11);
  border-radius: 32px;
  padding: 50px;
  border: 1px solid rgba(255,255,255,0.05);
}
.card-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.icon { font-size: 32px; }
.title { font-size: 18px; color: #71717a; font-weight: 500; }
.big-value {
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -2px;
  margin-bottom: 16px;
}
.status-tag {
  display: inline-block;
  padding: 10px 24px;
  border-radius: 24px;
  font-size: 16px;
  font-weight: 600;
  color: #fafafa;
}
.hint { font-size: 14px; color: #71717a; margin-top: 20px; }
.sub-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.sub-card {
  background: linear-gradient(145deg, #18181b, #0f0f11);
  border-radius: 20px;
  padding: 28px;
  border: 1px solid rgba(255,255,255,0.05);
}
.sub-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  font-size: 16px;
  color: #71717a;
}
.sub-value { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.sub-status { font-size: 13px; font-weight: 500; }
.footer {
  padding: 30px 60px;
  border-top: 1px solid #27272a;
  display: flex;
  justify-content: space-between;
  font-size: 16px;
  color: #71717a;
}
.link { color: #3b82f6; font-weight: 600; font-size: 18px; }
</style>
</head>
<body>
<div class="header">
  <div class="logo"><div class="logo-icon">📊</div>Crypto3D Daily</div>
  <div class="date">Mar 19, 2026</div>
</div>
<div class="content">

    <div class="main-card">
      <div class="card-header"><span class="icon">🔥</span><span class="title">AHR999</span></div>
      <div class="big-value" style="color:#22c55e">0.37</div>
      <div class="status-tag" style="background:#22c55e">抄底区</div>
      <div class="hint">BTC $71,225 | 200日成本 93,199</div>
      <svg viewBox="0 0 800 50"><polyline fill="none" stroke="#22c55e" stroke-width="2" points="0,36 133,32 267,45 400,34 533,14 667,5 800,33"/><circle cx="800" cy="33" r="3" fill="#22c55e"/></svg>
    </div>
<div class="sub-cards">
    <div class="sub-card">
      <div class="sub-header"><span class="icon">₿</span><span class="label">BTC</span></div>
      <div class="sub-value" style="color:#3b82f6">71225.00</div>
      <div class="sub-status" style="color:#3b82f6">$71,225</div>
      <svg viewBox="0 0 300 40"><polyline fill="none" stroke="#3b82f6" stroke-width="2" points="0,28 50,25 100,35 150,27 200,12 250,5 300,26"/><circle cx="300" cy="26" r="3" fill="#3b82f6"/></svg>
    </div>
    <div class="sub-card">
      <div class="sub-header"><span class="icon">📈</span><span class="label">MVRV</span></div>
      <div class="sub-value" style="color:#22c55e">1.31</div>
      <div class="sub-status" style="color:#22c55e">合理区</div>
      <svg viewBox="0 0 300 40"><polyline fill="none" stroke="#22c55e" stroke-width="2" points="0,35 50,32 100,31 150,19 200,5 250,10 300,30"/><circle cx="300" cy="30" r="3" fill="#22c55e"/></svg>
    </div></div>
</div>
<div class="footer">
  <span>每日加密市场晴雨表</span>
  <span class="link">crypto3d.pro</span>
</div>
</body>
</html>
