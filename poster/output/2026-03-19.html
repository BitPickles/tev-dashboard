<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #09090b;
  color: #fafafa;
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Header */
.hd {
  padding: 48px 64px 32px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.logo {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.logo-t {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.logo-s {
  font-size: 13px;
  color: #52525b;
  letter-spacing: 0.5px;
}
.date {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  color: #71717a;
  font-weight: 500;
}

/* BTC Bar */
.btc {
  margin: 0 64px;
  padding: 20px 28px;
  background: #18181b;
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.btc-ic {
  font-size: 32px;
}
.btc-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.btc-lb {
  font-size: 11px;
  color: #71717a;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.btc-num {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: #f59e0b;
}
.btc-rt {
  margin-left: auto;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
.btc-ch {
  height: 24px;
  width: 100px;
}
.btc-chg {
  font-size: 15px;
  font-weight: 600;
}

/* Main */
.cnt {
  flex: 1;
  padding: 48px 64px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}
.main {
  background: linear-gradient(135deg, #18181b 0%, #0f0f11 100%);
  border-radius: 24px;
  padding: 40px;
  border: 1px solid rgba(255,255,255,0.03);
}
.m-hd {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.ic {
  font-size: 28px;
}
.lb {
  font-size: 14px;
  color: #71717a;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.m-num {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 80px;
  font-weight: 700;
  letter-spacing: -2px;
  margin-bottom: 16px;
}
.m-tag {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 15px;
  font-weight: 600;
  color: #fafafa;
  margin-bottom: 20px;
}
.m-info {
  font-size: 15px;
  color: #a1a1aa;
  margin-bottom: 16px;
}
.m-desc {
  font-size: 14px;
  color: #71717a;
  line-height: 1.6;
  padding-top: 16px;
  border-top: 1px solid #27272a;
}

/* Subs */
.subs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.sub {
  background: #18181b;
  border-radius: 16px;
  padding: 24px;
}
.s-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.s-lb {
  font-size: 13px;
  color: #71717a;
  font-weight: 500;
}
.s-val {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}
.s-ch {
  height: 20px;
  width: 80px;
  margin-bottom: 8px;
}
.s-st {
  font-size: 12px;
  font-weight: 500;
}

/* Footer */
.ft {
  padding: 32px 64px;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: #52525b;
}
.link {
  color: #3b82f6;
  font-weight: 600;
}
</style>
</head>
<body>

<div class="hd">
  <div class="logo">
    <div class="logo-t">Crypto3D Daily</div>
    <div class="logo-s">Market Intelligence</div>
  </div>
  <div class="date">2026.03.19</div>
</div>

<div class="btc">
  <span class="btc-ic">₿</span>
  <div class="btc-info">
    <div class="btc-lb">Bitcoin</div>
    <div class="btc-num">$71,499</div>
  </div>
  <div class="btc-rt">
    <div class="btc-ch"><svg viewBox="0 0 100 24"><polyline fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" points="0,16 17,14 33,20 50,16 67,7 83,4 100,16"/><circle cx="100" cy="16" r="3" fill="#f59e0b"/></svg></div>
    <div class="btc-chg"><span style="color:#22c55e">+0.1%</span></div>
  </div>
</div>

<div class="cnt">

    <div class="main">
      <div class="m-hd"><span class="ic">🔥</span><span class="lb">AHR999</span></div>
      <div class="m-num" style="color:#22c55e">0.37</div>
      <div class="m-tag" style="background:#22c55e">抄底区</div>
      <div class="m-info">BTC $71,225 · 200日成本 $93,199</div>
      <div class="m-desc">价格低于200日成本线，历史上此位置定投收益显著</div>
    </div>
<div class="subs">
  <div class="sub">
    <div class="s-hd">
      <span class="s-lb">📈 MVRV</span>
    </div>
    <div class="s-val" style="color:#22c55e">1.31</div>
    <div class="s-ch"><svg viewBox="0 0 80 20"><polyline fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" points="0,16 13,15 27,14 40,10 53,4 67,6 80,14"/><circle cx="80" cy="14" r="3" fill="#22c55e"/></svg></div>
    <div class="s-st" style="color:#22c55e">合理区</div>
  </div>
  <div class="sub">
    <div class="s-hd">
      <span class="s-lb">⚠️ BMRI</span>
    </div>
    <div class="s-val" style="color:#3b82f6">47.4</div>
    <div class="s-ch"><svg viewBox="0 0 80 20"><polyline fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" points="0,15 13,15 27,16 40,6 53,4 67,9 80,11"/><circle cx="80" cy="11" r="3" fill="#3b82f6"/></svg></div>
    <div class="s-st" style="color:#3b82f6">中性</div>
  </div>
</div>
</div>

<div class="ft">
  <span>每日加密市场晴雨表</span>
  <span class="link">crypto3d.pro</span>
</div>

</body>
</html>
