<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #09090b;
  color: #fafafa;
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.hdr {
  padding: 56px 72px 0;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.brand {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.date {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  color: #52525b;
  font-weight: 500;
}

/* ── BTC Section ── */
.btc {
  padding: 40px 72px 0;
}
.btc-top {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 16px;
}
.btc-label {
  font-size: 13px;
  color: #52525b;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 500;
}
.btc-price {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 40px;
  font-weight: 700;
  color: #fafafa;
}
.btc-chg {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  font-weight: 500;
}
.btc-chart {
  margin: 0 -72px;
  padding: 0 72px;
}

/* ── Divider ── */
.divider {
  margin: 40px 72px;
  height: 1px;
  background: #27272a;
}

/* ── Main Card ── */
.card {
  margin: 0 72px;
  background: linear-gradient(160deg, #141416 0%, #0c0c0e 100%);
  border: 1px solid #1e1e22;
  border-radius: 24px;
  padding: 40px 44px;
}
.card-hd {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.card-icon { font-size: 24px; }
.card-name {
  font-size: 14px;
  color: #52525b;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 500;
}
.card-status {
  margin-left: auto;
  font-size: 14px;
  font-weight: 700;
}
.card-num {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -2px;
  margin: 8px 0 24px;
}
.card-gauge {
  margin-bottom: 24px;
}
.card-insight {
  font-size: 15px;
  color: #a1a1aa;
  line-height: 1.7;
  border-top: 1px solid #27272a;
  padding-top: 20px;
}
.card-insight strong {
  color: #fafafa;
}

/* ── Sub Rows ── */
.subs {
  padding: 0 72px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.row {
  display: grid;
  grid-template-columns: 80px 80px 100px 1fr;
  align-items: center;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid #1a1a1d;
}
.row:last-child { border-bottom: none; }
.row-name {
  font-size: 13px;
  color: #52525b;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.row-val {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px;
  font-weight: 700;
}
.row-chart {
  height: 18px;
}
.row-st {
  font-size: 13px;
  font-weight: 500;
  text-align: right;
}

/* ── Footer ── */
.ftr {
  margin-top: auto;
  padding: 32px 72px;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: #3f3f46;
}
.ftr a {
  color: #3b82f6;
  text-decoration: none;
  font-weight: 600;
}
</style>
</head>
<body>

</html>
