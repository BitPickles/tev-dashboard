<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #09090b;
  color: #fafafa;
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Header */
.hdr {
  padding: 52px 72px 0;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.brand {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 36px;
  font-weight: 700;
}
.date {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px;
  color: #52525b;
}

/* BTC */
.btc {
  padding: 36px 72px 0;
}
.btc-row {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin-bottom: 20px;
}
.btc-lb {
  font-size: 18px;
  color: #52525b;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 500;
}
.btc-p {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 52px;
  font-weight: 700;
}
.chg {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px;
  font-weight: 600;
}
.btc-area {
  margin: 0 -72px;
  padding: 0 72px;
}

/* Divider */
.div {
  margin: 36px 72px;
  height: 1px;
  background: #27272a;
}

/* Card */
.card {
  margin: 0 72px;
  background: linear-gradient(160deg, #141416 0%, #0c0c0e 100%);
  border: 1px solid #1e1e22;
  border-radius: 28px;
  padding: 40px 48px;
}
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.card-label {
  font-size: 22px;
  color: #71717a;
  font-weight: 500;
}
.card-st {
  font-size: 22px;
  font-weight: 700;
}
.card-num {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 96px;
  font-weight: 700;
  letter-spacing: -3px;
  margin: 4px 0 20px;
}
.card-gauge {
  margin-bottom: 24px;
}
.card-insight {
  font-size: 20px;
  color: #a1a1aa;
  line-height: 1.6;
  border-top: 1px solid #27272a;
  padding-top: 20px;
}
.card-insight strong {
  color: #fafafa;
  font-weight: 700;
}

/* Subs */
.subs {
  padding: 0 72px;
}
.row {
  display: grid;
  grid-template-columns: 100px 100px 140px 1fr;
  align-items: center;
  gap: 20px;
  padding: 20px 0;
  border-bottom: 1px solid #1a1a1d;
}
.row:last-child { border-bottom: none; }
.r-lb {
  font-size: 18px;
  color: #71717a;
  font-weight: 600;
}
.r-val {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 26px;
  font-weight: 700;
}
.r-sp {
  height: 28px;
}
.r-st {
  font-size: 18px;
  font-weight: 600;
  text-align: right;
}

/* Footer */
.ftr {
  margin-top: auto;
  padding: 36px 72px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 16px;
  color: #3f3f46;
}
.ftr-link {
  color: #3b82f6;
  font-weight: 600;
  font-size: 20px;
}
</style>
</head>
<body>

<div class="hdr">
  <div class="brand">Crypto3D</div>

</div>

<div class="btc">
  <div class="btc-row">

<div class="ftr">

</body>
</html>
