<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',-apple-system,sans-serif;
  width:1080px;height:1350px;overflow:hidden;
  color:#e4e4e7;
  display:flex;flex-direction:column;
  background:#08080c;
  background-image:radial-gradient(ellipse 120% 50% at 50% 20%,#111118,#08080c);
}

/* HEADER */
.hdr{text-align:center;padding:40px 0 24px}
.h-title{font-size:36px;font-weight:800;letter-spacing:-0.5px;color:#fafafa}
.h-date{font-size:14px;font-weight:500;color:#3f3f46;letter-spacing:2px;margin-top:6px;text-transform:uppercase}

/* BTC */
.btc{padding:0 56px}
.btc-row{display:flex;align-items:baseline;gap:14px}
.btc-lb{font-size:14px;font-weight:600;color:#52525b;text-transform:uppercase;letter-spacing:2px}
.btc-p{font-size:52px;font-weight:800;color:#fafafa;letter-spacing:-2px}
.chg{font-size:20px;font-weight:700}
.btc-chart{height:130px;margin:0 -56px;overflow:hidden}

/* CARD */
.card{
  margin:20px 48px;
  padding:32px 36px 28px;
  background:linear-gradient(160deg,#111116,#0b0b10);
  border:1px solid #1a1a20;
  border-radius:20px;
}
.c-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.c-lb{font-size:18px;font-weight:600;color:#71717a}
.c-st{font-size:18px;font-weight:800}
.c-num{font-size:76px;font-weight:800;letter-spacing:-3px;margin:4px 0 16px;line-height:1}
.c-gauge{margin-bottom:20px}
.c-meta{
  display:flex;gap:28px;padding-top:16px;
  border-top:1px solid #1a1a20;
}
.c-meta>div{display:flex;flex-direction:column;gap:2px}
.c-ml{font-size:12px;font-weight:500;color:#52525b;text-transform:uppercase;letter-spacing:0.5px}
.c-mv{font-size:20px;font-weight:700;color:#d4d4d8}

/* SUBS */
.subs{
  margin:12px 48px 0;
  padding:28px 36px;
  background:linear-gradient(160deg,#111116,#0b0b10);
  border:1px solid #1a1a20;
  border-radius:20px;
  flex:1;
  display:flex;flex-direction:column;justify-content:space-evenly;
}
.s-row{
  display:flex;align-items:center;
  padding:20px 0;
  border-bottom:1px solid #15151a;
}
.s-row:last-child{border-bottom:none}
.s-left{width:160px;display:flex;flex-direction:column;gap:4px}
.s-name{font-size:15px;font-weight:600;color:#52525b;letter-spacing:0.5px}
.s-val{font-size:36px;font-weight:800;letter-spacing:-0.5px}
.s-mid{flex:1;height:48px;padding:0 24px}
.s-tag{width:90px;text-align:right;font-size:20px;font-weight:700}

/* FOOTER */
.ftr{
  padding:20px 56px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;color:#27272a;
}
.ftr-l{color:#3b82f6;font-weight:700;font-size:17px}
</style>
</head>
<body>

<div class="hdr">
  <div class="h-title">Crypto3D 数据日报</div>
  <div class="h-date">周五 · 2026.03.20</div>
</div>

<div class="btc">
  <div class="btc-row">
    <span class="btc-lb">Bitcoin</span>
    <span class="btc-p">$70,759</span>
    <span class="chg" style="color:#fb7185">-3.3%</span>
  </div>
  <div class="btc-chart"><svg viewBox="0 0 1000 140" preserveAspectRatio="none" style="display:block;width:100%;height:100%"><defs><linearGradient id="af" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b" stop-opacity="0.4"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/></linearGradient></defs><polygon fill="url(#af)" points="0,70 167,99 333,78 500,38 667,21 833,78 1000,126 1000,140 0,140"/><polyline fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="0,70 167,99 333,78 500,38 667,21 833,78 1000,126"/></svg></div>
</div>


<div class="card">
  <div class="c-row"><span class="c-lb">🔥 AHR999</span><span class="c-st" style="color:#34d399">抄底区</span></div>
  <div class="c-num" style="color:#34d399">0.36</div>
  <div class="c-gauge"><div style="position:relative;height:12px;border-radius:6px;background:#1a1a1f"><div style="position:absolute;left:0.0%;width:30.0%;height:100%;background:#34d399;opacity:0.12;border-radius:6px"></div><div style="position:absolute;left:30.0%;width:50.0%;height:100%;background:#fbbf24;opacity:0.12;border-radius:6px"></div><div style="position:absolute;left:80.0%;width:20.0%;height:100%;background:#fb7185;opacity:0.12;border-radius:6px"></div><div style="position:absolute;left:0;width:24.14666666666667%;height:100%;background:linear-gradient(90deg,#34d39900,#34d399);opacity:0.4;border-radius:6px"></div><div style="position:absolute;left:24.14666666666667%;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:#34d399;box-shadow:0 0 16px #34d39980"></div><div style="position:absolute;left:24.14666666666667%;top:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:#fff"></div></div><div style="position:relative;height:24px;margin-top:6px"><span style="position:absolute;left:15.0%;transform:translateX(-50%);font-size:15px;color:#52525b;font-weight:500">抄底</span><span style="position:absolute;left:54.99999999999999%;transform:translateX(-50%);font-size:15px;color:#52525b;font-weight:500">定投</span><span style="position:absolute;left:90.0%;transform:translateX(-50%);font-size:15px;color:#52525b;font-weight:500">观望</span></div></div>
  <div class="c-meta">
    <div><span class="c-ml">BTC</span><span class="c-mv">$70,759</span></div>
    <div><span class="c-ml">200日成本</span><span class="c-mv">$93,000</span></div>
    <div><span class="c-ml">价格/成本</span><span class="c-mv" style="color:#34d399">76%</span></div>
  </div>
</div>

<div class="subs">

    <div class="s-row">
      <div class="s-left"><span class="s-name">MVRV</span><span class="s-val" style="color:#34d399">1.29</span></div>
      <div class="s-mid"><svg viewBox="0 0 240 48" style="display:block;width:100%;height:100%"><polyline fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="0,34 40,33 80,21 120,7 160,12 200,32 240,41"/><circle cx="240" cy="41" r="4" fill="#34d399"/></svg></div>
      <span class="s-tag" style="color:#34d399">合理区</span>
    </div>
    <div class="s-row">
      <div class="s-left"><span class="s-name">BMRI</span><span class="s-val" style="color:#34d399">45.2</span></div>
      <div class="s-mid"><svg viewBox="0 0 240 48" style="display:block;width:100%;height:100%"><polyline fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="0,39 40,41 80,14 120,7 160,30 200,35 240,38"/><circle cx="240" cy="38" r="4" fill="#34d399"/></svg></div>
      <span class="s-tag" style="color:#34d399">中性</span>
    </div>
    <div class="s-row">
      <div class="s-left"><span class="s-name">BTC.D</span><span class="s-val" style="color:#34d399">58.2%</span></div>
      <div class="s-mid"><svg viewBox="0 0 240 48" style="display:block;width:100%;height:100%"><polyline fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="0,7 40,14 80,11 120,12 160,23 200,29 240,41"/><circle cx="240" cy="41" r="4" fill="#34d399"/></svg></div>
      <span class="s-tag" style="color:#34d399">平衡</span>
    </div>
</div>

<div class="ftr">
  <span>DAILY MARKET SNAPSHOT</span>
  <span class="ftr-l">crypto3d.pro</span>
</div>

</body>
</html>
