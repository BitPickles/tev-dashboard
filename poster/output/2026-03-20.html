<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'DM Sans',sans-serif;
  color:#fafafa;
  width:1080px;
  height:1350px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  background:#07070a;
  background-image:radial-gradient(ellipse 80% 60% at 50% 30%, #12121a 0%, #07070a 100%);
}

/* Header */
.hdr{
  padding:52px 72px 0;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}
.brand{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;letter-spacing:-0.5px}
.sub-brand{font-size:13px;color:#3f3f46;letter-spacing:2px;text-transform:uppercase;margin-top:6px}
.dt{text-align:right}
.dt-date{font-family:'Space Grotesk',sans-serif;font-size:20px;color:#52525b;font-weight:500}
.dt-day{font-size:13px;color:#3f3f46;margin-top:4px}

/* BTC */
.btc{padding:36px 72px 0}
.btc-r{display:flex;align-items:baseline;gap:20px;margin-bottom:16px}
.btc-lb{font-size:16px;color:#52525b;text-transform:uppercase;letter-spacing:2px;font-weight:500}
.btc-p{font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:700;color:#fafafa}

/* Divider */
.dv{margin:32px 72px;height:1px;background:linear-gradient(90deg,transparent,#27272a 20%,#27272a 80%,transparent)}

/* Card */
.card{margin:0 72px;background:linear-gradient(160deg,rgba(20,20,24,0.8),rgba(12,12,14,0.9));border:1px solid rgba(255,255,255,0.04);border-radius:24px;padding:36px 44px;backdrop-filter:blur(10px)}
.c-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.c-lb{font-size:20px;color:#71717a;font-weight:500}
.c-st{font-size:20px;font-weight:700}
.c-num{font-family:'Space Grotesk',sans-serif;font-size:88px;font-weight:700;letter-spacing:-3px;margin:4px 0 20px}
.c-gauge{margin-bottom:20px}
.c-ins{font-size:18px;color:#71717a;line-height:1.6;border-top:1px solid rgba(255,255,255,0.06);padding-top:18px}
.c-ins b{color:#d4d4d8;font-weight:700}

/* Subs */
.subs{padding:0 72px}
.row{display:grid;grid-template-columns:100px 100px 140px 1fr;align-items:center;gap:16px;padding:18px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.row:last-child{border-bottom:none}
.r-lb{font-size:17px;color:#52525b;font-weight:600}
.r-v{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700}
.r-sp{height:28px}
.r-s{font-size:16px;font-weight:600;text-align:right}

/* Footer */
.ftr{
  margin-top:auto;
  padding:32px 72px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
  color:#27272a;
}
.ftr-l{color:#3b82f6;font-weight:600;font-size:18px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="brand">Crypto3D</div>
    <div class="sub-brand">Market Intelligence</div>
  </div>
  <div class="dt">
    <div class="dt-date">2026.03.20</div>
    <div class="dt-day">周五</div>
  </div>
</div>

<div class="btc">
  <div class="btc-r">
    <span class="btc-lb">Bitcoin</span>
    <span class="btc-p">$70,759</span>
    <span style="color:#f87171;font-family:Space Grotesk;font-size:20px;font-weight:600">-3.3%</span>
  </div>
  <svg viewBox="0 0 940 130" style="display:block;width:100%"><defs><linearGradient id="agrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/></linearGradient></defs><polygon fill="url(#agrad)" points="0,62 157,91 313,70 470,29 627,12 783,70 940,118 940,130 0,130"/><polyline fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="0,62 157,91 313,70 470,29 627,12 783,70 940,118"/></svg>
</div>

<div class="dv"></div>


<div class="card">
  <div class="c-top"><div class="c-lb">🔥 AHR999</div><div class="c-st" style="color:#4ade80">抄底区</div></div>
  <div class="c-num" style="color:#4ade80;text-shadow:0 0 80px #4ade8040">0.36</div>
  <div class="c-gauge"><svg viewBox="0 0 840 48" style="display:block;width:100%"><rect x="0" y="8" width="252" height="6" fill="#4ade80" opacity="0.15" rx="3"/><rect x="252" y="8" width="420" height="6" fill="#facc15" opacity="0.15" rx="3"/><rect x="672" y="8" width="168" height="6" fill="#f87171" opacity="0.15" rx="3"/><rect x="0" y="8" width="203" height="6" fill="#4ade80" opacity="0.5" rx="3"/><circle cx="203" cy="11" r="8" fill="#4ade80" opacity="0.3"/><circle cx="203" cy="11" r="5" fill="#fafafa"/><circle cx="203" cy="11" r="2.5" fill="#4ade80"/><text x="126" y="40" text-anchor="middle" font-size="16" fill="#52525b" font-family="DM Sans,sans-serif" font-weight="500">抄底</text><text x="462" y="40" text-anchor="middle" font-size="16" fill="#52525b" font-family="DM Sans,sans-serif" font-weight="500">定投</text><text x="756" y="40" text-anchor="middle" font-size="16" fill="#52525b" font-family="DM Sans,sans-serif" font-weight="500">观望</text></svg></div>
  <div class="c-ins">价格 = 200日成本的 <b>76%</b> · 定投成本 $93,000</div>
</div>

<div class="dv"></div>

<div class="subs">

  <div class="row"><span class="r-lb">MVRV</span><span class="r-v" style="color:#4ade80">1.29</span><span class="r-sp"><svg viewBox="0 0 120 28" style="display:block"><polyline fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="0,20 20,19 40,12 60,4 80,7 100,19 120,24"/><circle cx="120" cy="24" r="3.5" fill="#4ade80"/></svg></span><span class="r-s" style="color:#4ade80">合理区</span></div>

  <div class="row"><span class="r-lb">BMRI</span><span class="r-v" style="color:#4ade80">45.2</span><span class="r-sp"><svg viewBox="0 0 120 28" style="display:block"><polyline fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="0,23 20,24 40,8 60,4 80,18 100,20 120,22"/><circle cx="120" cy="22" r="3.5" fill="#4ade80"/></svg></span><span class="r-s" style="color:#4ade80">中性</span></div>

  <div class="row"><span class="r-lb">BTC.D</span><span class="r-v" style="color:#4ade80">58.2%</span><span class="r-sp"><svg viewBox="0 0 120 28" style="display:block"><polyline fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="0,4 20,8 40,6 60,7 80,14 100,17 120,24"/><circle cx="120" cy="24" r="3.5" fill="#4ade80"/></svg></span><span class="r-s" style="color:#4ade80">平衡</span></div>
</div>

<div class="ftr">
  <span>Daily Market Snapshot</span>
  <span class="ftr-l">crypto3d.pro</span>
</div>

</body>
</html>
