<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  color: #e4e4e7;
  background: #08080c;
  background-image:
    radial-gradient(ellipse 100% 50% at 50% 0%, #13131a 0%, transparent 70%),
    radial-gradient(circle at 80% 80%, #0f0f18 0%, transparent 50%);
}

/* === HEADER === */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 44px 56px 28px;
  gap: 8px;
}
.h-brand {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -1px;
  color: #fafafa;
}
.h-date {
  font-size: 18px;
  font-weight: 600;
  color: #3f3f46;
  letter-spacing: 1px;
}

/* === BTC SECTION === */
.btc-section {
  padding: 0 56px;
}
.btc-top {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 8px;
}
.btc-label {
  font-size: 15px;
  font-weight: 600;
  color: #52525b;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.btc-price {
  font-size: 56px;
  font-weight: 800;
  color: #fafafa;
  letter-spacing: -2px;
}
.btc-chg {
  font-size: 22px;
  font-weight: 700;
}
.btc-chart {
  height: 160px;
  margin: 0 -56px;
  padding: 0 56px;
  overflow: hidden;
}

/* === MAIN CARD === */
.card {
  margin: 24px 56px;
  padding: 36px 40px 32px;
  background: linear-gradient(145deg, #111115 0%, #0a0a0e 100%);
  border: 1px solid #1c1c22;
  border-radius: 20px;
}
.c-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.c-title {
  font-size: 18px;
  font-weight: 600;
  color: #71717a;
}
.c-val {
  font-size: 80px;
  font-weight: 800;
  letter-spacing: -3px;
  line-height: 1;
  margin-bottom: 16px;
}
.c-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 24px;
}
.c-gauge {
  margin-bottom: 24px;
}
.c-detail {
  display: flex;
  gap: 32px;
  padding-top: 20px;
  border-top: 1px solid #1c1c22;
}
.c-d-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.c-d-label {
  font-size: 13px;
  font-weight: 500;
  color: #52525b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.c-d-val {
  font-size: 22px;
  font-weight: 700;
  color: #d4d4d8;
}

/* === SUB INDICATORS === */
.subs {
  padding: 0 56px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.s-item {
  display: flex;
  align-items: center;
  padding: 20px 0;
  border-bottom: 1px solid #1418;
}
.s-item:last-child { border-bottom: none; }
.s-left {
  width: 160px;
}
.s-name {
  font-size: 14px;
  font-weight: 600;
  color: #52525b;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.s-num {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.s-chart {
  flex: 1;
  height: 32px;
  padding: 0 24px;
}
.s-status {
  width: 80px;
  text-align: right;
  font-size: 15px;
  font-weight: 600;
}

/* === FOOTER === */
.footer {
  margin-top: auto;
  padding: 28px 56px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.f-tag {
  font-size: 13px;
  font-weight: 500;
  color: #27272a;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.f-link {
  font-size: 18px;
  font-weight: 700;
  color: #3b82f6;
}
</style>
</head>
<body>

</html>
