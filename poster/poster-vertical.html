<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Crypto3D Daily</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: #0a0a0b;
      color: #fafafa;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 40px;
      border-bottom: 1px solid #27272a;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 700;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b82f6, #22c55e);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .date {
      color: #71717a;
      font-size: 18px;
    }
    
    .main {
      flex: 1;
      padding: 30px 40px;
      display: flex;
      flex-direction: column;
    }
    
    /* 焦点区域 */
    .focus-section {
      text-align: center;
      padding: 25px 0;
      border-bottom: 1px solid #27272a;
      margin-bottom: 25px;
    }
    .focus-label {
      font-size: 20px;
      color: #71717a;
      margin-bottom: 12px;
    }
    .focus-indicator {
      font-size: 80px;
      font-weight: 700;
      margin-bottom: 15px;
      letter-spacing: -3px;
    }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
    .neutral { color: #3b82f6; }
    
    .status-badge {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .bg-positive { background: rgba(34, 197, 94, 0.2); }
    .bg-negative { background: rgba(239, 68, 68, 0.2); }
    .bg-neutral { background: rgba(59, 130, 246, 0.2); }
    
    .details {
      display: flex;
      justify-content: center;
      gap: 40px;
      font-size: 18px;
      color: #a1a1aa;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .detail-label {
      font-size: 14px;
      color: #71717a;
    }
    .detail-value {
      color: #fafafa;
      font-weight: 600;
      font-size: 22px;
    }
    
    /* 指标网格 */
    .indicators-section {
      flex: 1;
    }
    .section-title {
      font-size: 16px;
      color: #71717a;
      margin-bottom: 15px;
      text-align: center;
    }
    .indicators-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .indicator-card {
      background: #18181b;
      border-radius: 12px;
      padding: 20px;
    }
    .indicator-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .indicator-name {
      font-size: 14px;
      color: #71717a;
    }
    .indicator-change {
      font-size: 12px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .indicator-value {
      font-size: 28px;
      font-weight: 700;
      color: #fafafa;
      margin-bottom: 5px;
    }
    .indicator-status {
      font-size: 12px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
      display: inline-block;
    }
    
    /* 迷你图表 */
    .mini-chart {
      height: 40px;
      margin-top: 10px;
    }
    .mini-chart svg {
      width: 100%;
      height: 40px;
    }
    
    .footer {
      padding: 20px 40px;
      border-top: 1px solid #27272a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      color: #71717a;
    }
    .footer-link {
      color: #3b82f6;
      font-weight: 600;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">📊</div>
      Crypto3D Daily
    </div>
    <div class="date">Mar 19, 2026</div>
  </div>
  
  <div class="main">
    <!-- AHR999 焦点 -->
    <div class="focus-section">
      <div class="focus-label">🔥 AHR999 指数</div>
      <div class="focus-indicator positive">0.37</div>
      <div class="status-badge positive bg-positive">抄底区</div>
      
      <div class="details">
        <div class="detail-item">
          <span class="detail-label">BTC 价格</span>
          <span class="detail-value">$71,225</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">200日成本</span>
          <span class="detail-value">$93,199</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">周变化</span>
          <span class="detail-value positive">+0.7%</span>
        </div>
      </div>
    </div>
    
    <!-- 其他指标 -->
    <div class="indicators-section">
      <div class="section-title">7日趋势</div>
      <div class="indicators-grid">
        <!-- MVRV -->
        <div class="indicator-card">
          <div class="indicator-header">
            <span class="indicator-name">MVRV</span>
            <span class="indicator-change positive bg-positive">+1.0%</span>
          </div>
          <div class="indicator-value">1.31</div>
          <span class="indicator-status positive bg-positive">合理区</span>
          <div class="mini-chart">
            <svg viewBox="0 0 200 40">
              <polyline fill="none" stroke="#22c55e" stroke-width="2" points="0,30 33,28 66,27 100,22 133,15 166,18 200,25"/>
              <circle cx="200" cy="25" r="3" fill="#22c55e"/>
            </svg>
          </div>
        </div>
        
        <!-- BMRI -->
        <div class="indicator-card">
          <div class="indicator-header">
            <span class="indicator-name">BMRI</span>
            <span class="indicator-change negative bg-negative">+5.4%</span>
          </div>
          <div class="indicator-value">47.4</div>
          <span class="indicator-status neutral bg-neutral">NEUTRAL</span>
          <div class="mini-chart">
            <svg viewBox="0 0 200 40">
              <polyline fill="none" stroke="#3b82f6" stroke-width="2" points="0,25 33,24 66,26 100,15 133,10 166,14 200,18"/>
              <circle cx="200" cy="18" r="3" fill="#3b82f6"/>
            </svg>
          </div>
        </div>
        
        <!-- BTC.D -->
        <div class="indicator-card">
          <div class="indicator-header">
            <span class="indicator-name">BTC.D</span>
            <span class="indicator-change negative bg-negative">-0.4%</span>
          </div>
          <div class="indicator-value">58.4%</div>
          <span class="indicator-status neutral bg-neutral">平衡</span>
          <div class="mini-chart">
            <svg viewBox="0 0 200 40">
              <polyline fill="none" stroke="#3b82f6" stroke-width="2" points="0,15 33,12 66,14 100,13 133,16 166,20 200,22"/>
              <circle cx="200" cy="22" r="3" fill="#3b82f6"/>
            </svg>
          </div>
        </div>
        
        <!-- AHR999 趋势 -->
        <div class="indicator-card">
          <div class="indicator-header">
            <span class="indicator-name">AHR999 趋势</span>
            <span class="indicator-change positive bg-positive">抄底中</span>
          </div>
          <div class="indicator-value">0.37</div>
          <span class="indicator-status positive bg-positive">低于0.45</span>
          <div class="mini-chart">
            <svg viewBox="0 0 200 40">
              <polyline fill="none" stroke="#22c55e" stroke-width="2" points="0,28 33,26 66,30 100,25 133,20 166,18 200,24"/>
              <circle cx="200" cy="24" r="3" fill="#22c55e"/>
              <!-- 抄底线 -->
              <line x1="0" y1="30" x2="200" y2="30" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <span>每日加密市场晴雨表</span>
    <span class="footer-link">crypto3d.pro</span>
  </div>
</body>
</html>
