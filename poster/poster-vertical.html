<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Crypto3D Daily</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: #0a0a0b;
      color: #fafafa;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    /* 顶部品牌栏 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 50px;
      border-bottom: 1px solid #27272a;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 28px;
      font-weight: 700;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #22c55e);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .date {
      color: #71717a;
      font-size: 20px;
    }
    
    /* 主内容区 */
    .main {
      flex: 1;
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
    }
    
    /* 焦点区域 */
    .focus-section {
      text-align: center;
      padding: 30px 0;
      border-bottom: 1px solid #27272a;
      margin-bottom: 30px;
    }
    .focus-label {
      font-size: 24px;
      color: #71717a;
      margin-bottom: 15px;
    }
    .focus-indicator {
      font-size: 100px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -4px;
    }
    .focus-indicator.positive { color: #22c55e; }
    .focus-indicator.negative { color: #ef4444; }
    .focus-indicator.neutral { color: #3b82f6; }
    
    /* 状态标签 */
    .status-badge {
      display: inline-block;
      padding: 10px 25px;
      border-radius: 25px;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 25px;
    }
    .status-badge.positive { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .status-badge.negative { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .status-badge.neutral { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    
    /* 进度条 */
    .progress-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto 25px;
    }
    .progress-bar {
      height: 20px;
      background: #27272a;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 10px;
    }
    .progress-fill.positive { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .progress-fill.negative { background: linear-gradient(90deg, #ef4444, #f87171); }
    .progress-fill.neutral { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    
    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 16px;
      color: #71717a;
    }
    
    /* 详情行 */
    .details {
      display: flex;
      justify-content: center;
      gap: 50px;
      font-size: 22px;
      color: #a1a1aa;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .detail-label {
      font-size: 16px;
      color: #71717a;
    }
    .detail-value {
      color: #fafafa;
      font-weight: 600;
      font-size: 28px;
    }
    
    /* 其他指标 */
    .other-section {
      flex: 1;
    }
    .other-title {
      font-size: 18px;
      color: #71717a;
      margin-bottom: 20px;
      text-align: center;
    }
    .indicators-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .indicator-card {
      background: #18181b;
      border-radius: 16px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .indicator-name {
      font-size: 18px;
      color: #71717a;
      margin-bottom: 10px;
    }
    .indicator-value {
      font-size: 36px;
      font-weight: 700;
      color: #fafafa;
      margin-bottom: 10px;
    }
    .indicator-status {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
    }
    .indicator-status.positive { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .indicator-status.negative { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .indicator-status.neutral { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    
    /* 底部水印 */
    .footer {
      padding: 25px 50px;
      border-top: 1px solid #27272a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      color: #71717a;
    }
    .footer-link {
      color: #3b82f6;
      font-weight: 600;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">📊</div>
      Crypto3D Daily
    </div>
    <div class="date">Mar 19, 2026</div>
  </div>
  
  <div class="main">
    <!-- AHR999 焦点 -->
    <div class="focus-section">
      <div class="focus-label">🔥 AHR999 指数</div>
      <div class="focus-indicator positive">0.37</div>
      <div class="status-badge positive">抄底区</div>
      
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill positive" style="width: 25%"></div>
        </div>
        <div class="progress-labels">
          <span>0 抄底</span>
          <span>0.75 合理</span>
          <span>1.5 过热</span>
        </div>
      </div>
      
      <div class="details">
        <div class="detail-item">
          <span class="detail-label">BTC 价格</span>
          <span class="detail-value">$71,225</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">200日成本</span>
          <span class="detail-value">$93,199</span>
        </div>
      </div>
    </div>
    
    <!-- 其他指标 -->
    <div class="other-section">
      <div class="other-title">其他市场指标</div>
      <div class="indicators-grid">
        <div class="indicator-card">
          <div class="indicator-name">MVRV</div>
          <div class="indicator-value">1.31</div>
          <div class="indicator-status positive">合理区</div>
        </div>
        <div class="indicator-card">
          <div class="indicator-name">BMRI</div>
          <div class="indicator-value">47.4</div>
          <div class="indicator-status neutral">NEUTRAL</div>
        </div>
        <div class="indicator-card">
          <div class="indicator-name">BTC.D</div>
          <div class="indicator-value">58.4%</div>
          <div class="indicator-status neutral">平衡</div>
        </div>
        <div class="indicator-card">
          <div class="indicator-name">市场情绪</div>
          <div class="indicator-value">🟢</div>
          <div class="indicator-status positive">偏多</div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <span>每日加密市场晴雨表</span>
    <span class="footer-link">crypto3d.pro</span>
  </div>
</body>
</html>
