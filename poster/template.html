<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  color: #e4e4e7;
  display: flex;
  flex-direction: column;
  background: #08080c;
  position: relative;
}

/* === BACKGROUND TEXTURE === */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 90% 40% at 50% 0%, rgba(59,130,246,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 60% 30% at 80% 60%, rgba(34,197,94,0.03) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(245,158,11,0.02) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* subtle dot grid */
body::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  z-index: 0;
}

body > * { position: relative; z-index: 1; }

/* === HEADER === */
.header {
  text-align: center;
  padding: 48px 60px 28px;
}

.header-brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.header-logo {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 900;
  color: #fff;
}

.header-title {
  font-size: 42px;
  font-weight: 900;
  color: #fafafa;
  letter-spacing: -1px;
}

.header-date {
  font-size: 26px;
  font-weight: 600;
  color: #52525b;
  letter-spacing: 2px;
}

/* === BTC BANNER === */
.btc-banner {
  padding: 8px 60px 0;
  position: relative;
}

.btc-row {
  display: flex;
  align-items: baseline;
  gap: 16px;
}

.btc-label {
  font-size: 22px;
  font-weight: 700;
  color: #52525b;
  text-transform: uppercase;
  letter-spacing: 3px;
}

.btc-price {
  font-size: 64px;
  font-weight: 900;
  color: #fafafa;
  letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
}

.btc-change {
  font-size: 28px;
  font-weight: 800;
  padding: 4px 14px;
  border-radius: 8px;
}

.btc-change.up { color: #34d399; background: rgba(34,197,94,0.1); }
.btc-change.down { color: #fb7185; background: rgba(251,113,133,0.1); }

.btc-chart {
  height: 110px;
  margin: -4px -60px 0;
  overflow: hidden;
  opacity: 0.7;
}

/* === DIVIDER === */
.divider {
  margin: 12px 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #1e1e28, transparent);
}

/* === FOCUS CARD === */
.focus-card {
  margin: 8px 48px;
  padding: 36px 40px 32px;
  background: linear-gradient(165deg, #111118 0%, #0c0c12 100%);
  border: 1px solid #1a1a24;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}

/* subtle glow on card */
.focus-card::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -60px;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  pointer-events: none;
}

.focus-card.green::before { background: radial-gradient(circle, rgba(34,197,94,0.08), transparent 70%); }
.focus-card.blue::before { background: radial-gradient(circle, rgba(59,130,246,0.08), transparent 70%); }
.focus-card.red::before { background: radial-gradient(circle, rgba(251,113,133,0.08), transparent 70%); }
.focus-card.yellow::before { background: radial-gradient(circle, rgba(251,191,36,0.08), transparent 70%); }

.card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 8px;
}

.card-icon {
  font-size: 28px;
}

.card-name {
  font-size: 24px;
  font-weight: 600;
  color: #71717a;
  letter-spacing: 2px;
  text-transform: uppercase;
  flex: 1;
}

.card-badge {
  font-size: 24px;
  font-weight: 800;
  padding: 6px 18px;
  border-radius: 10px;
}

.card-badge.green { color: #34d399; background: rgba(34,197,94,0.12); }
.card-badge.blue { color: #60a5fa; background: rgba(96,165,250,0.12); }
.card-badge.red { color: #fb7185; background: rgba(251,113,133,0.12); }
.card-badge.yellow { color: #fbbf24; background: rgba(251,191,36,0.12); }

.card-value {
  font-size: 84px;
  font-weight: 900;
  letter-spacing: -3px;
  line-height: 1;
  margin: 8px 0 24px;
  font-variant-numeric: tabular-nums;
}

/* === GAUGE === */
.gauge-wrap {
  margin-bottom: 24px;
}

.gauge-bar {
  position: relative;
  height: 14px;
  border-radius: 7px;
  background: #15151c;
  overflow: visible;
}

.gauge-fill {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  border-radius: 7px;
  opacity: 0.35;
}

.gauge-zone {
  position: absolute;
  top: 0;
  height: 100%;
  opacity: 0.12;
  border-radius: 7px;
}

.gauge-dot-outer {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 22px;
  height: 22px;
  border-radius: 50%;
}

.gauge-dot-inner {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #fff;
}

.gauge-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  padding: 0 4px;
}

.gauge-label {
  font-size: 22px;
  font-weight: 700;
  color: #52525b;
}

.gauge-label.active {
  color: inherit; /* overridden by inline style */
}

/* === CARD META === */
.card-meta {
  display: flex;
  gap: 0;
  padding-top: 20px;
  border-top: 1px solid #1a1a24;
}

.meta-item {
  flex: 1;
  text-align: center;
}

.meta-item:not(:last-child) {
  border-right: 1px solid #1a1a24;
}

.meta-label {
  font-size: 20px;
  font-weight: 600;
  color: #52525b;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.meta-value {
  font-size: 28px;
  font-weight: 800;
  color: #e4e4e7;
  font-variant-numeric: tabular-nums;
}

/* === SECONDARY METRICS === */
.secondary {
  margin: 16px 48px 0;
  padding: 28px 36px;
  background: linear-gradient(165deg, #111118 0%, #0c0c12 100%);
  border: 1px solid #1a1a24;
  border-radius: 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.sec-row {
  display: flex;
  align-items: center;
  padding: 22px 0;
}

.sec-row:not(:last-child) {
  border-bottom: 1px solid #15151c;
}

.sec-info {
  width: 160px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sec-name {
  font-size: 20px;
  font-weight: 600;
  color: #52525b;
  letter-spacing: 1px;
}

.sec-value {
  font-size: 42px;
  font-weight: 900;
  letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
}

.sec-spark {
  flex: 1;
  height: 52px;
  padding: 0 24px;
}

.sec-badge {
  width: 110px;
  text-align: right;
  font-size: 22px;
  font-weight: 800;
  padding: 6px 14px;
  border-radius: 8px;
  display: inline-block;
}

.sec-badge.green { color: #34d399; background: rgba(34,197,94,0.1); }
.sec-badge.blue { color: #60a5fa; background: rgba(96,165,250,0.1); }
.sec-badge.red { color: #fb7185; background: rgba(251,113,133,0.1); }
.sec-badge.yellow { color: #fbbf24; background: rgba(251,191,36,0.1); }

/* === FOOTER === */
.footer {
  padding: 20px 60px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-tagline {
  font-size: 20px;
  font-weight: 600;
  color: #27272a;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.footer-brand {
  font-size: 24px;
  font-weight: 800;
  color: #3b82f6;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">Crypto3D 数据日报</div>
  <div class="header-date">{{WEEKDAY}} · {{DATE}}</div>
</div>

<!-- BTC BANNER -->
<div class="btc-banner">
  <div class="btc-row">
    <span class="btc-label">Bitcoin</span>
    <span class="btc-price">{{BTC_PRICE}}</span>
    <span class="btc-change {{CHG_CLASS}}">{{BTC_CHANGE}}</span>
  </div>
  <div class="btc-chart">{{BTC_AREA_SVG}}</div>
</div>

<div class="divider"></div>

<!-- FOCUS CARD -->
<div class="focus-card {{FOCUS_COLOR_CLASS}}">
  <div class="card-header">
    <span class="card-icon">{{FOCUS_ICON}}</span>
    <span class="card-name">{{FOCUS_NAME}}</span>
    <span class="card-badge {{FOCUS_BADGE_CLASS}}">{{FOCUS_STATUS}}</span>
  </div>
  <div class="card-value" style="color:{{FOCUS_COLOR}}">{{FOCUS_VALUE}}</div>
  <div class="gauge-wrap">{{GAUGE_HTML}}</div>
  <div class="card-meta">{{META_HTML}}</div>
</div>

<!-- SECONDARY METRICS -->
<div class="secondary">
  {{SEC_ROWS}}
</div>

<!-- FOOTER -->
<div class="footer">
  <span class="footer-tagline">Daily Market Snapshot</span>
  <span class="footer-brand">crypto3d.pro</span>
</div>

</body>
</html>
