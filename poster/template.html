<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Crypto3D Daily</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: #0a0a0b;
      color: #fafafa;
      width: 1200px;
      height: 675px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    /* 顶部品牌栏 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #27272a;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 700;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b82f6, #22c55e);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .date {
      color: #71717a;
      font-size: 18px;
    }
    
    /* 主内容区 */
    .main {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    /* 焦点区域 */
    .focus-section {
      text-align: center;
      margin-bottom: 30px;
    }
    .focus-label {
      font-size: 20px;
      color: #71717a;
      margin-bottom: 10px;
    }
    .focus-indicator {
      font-size: 72px;
      font-weight: 700;
      margin-bottom: 15px;
      letter-spacing: -2px;
    }
    .focus-indicator.positive { color: #22c55e; }
    .focus-indicator.negative { color: #ef4444; }
    .focus-indicator.neutral { color: #3b82f6; }
    
    /* 进度条 */
    .progress-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto 20px;
    }
    .progress-bar {
      height: 20px;
      background: #27272a;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease;
    }
    .progress-fill.positive { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .progress-fill.negative { background: linear-gradient(90deg, #ef4444, #f87171); }
    .progress-fill.neutral { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    
    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 14px;
      color: #71717a;
    }
    
    /* 详情行 */
    .details {
      display: flex;
      justify-content: center;
      gap: 40px;
      font-size: 24px;
      color: #a1a1aa;
    }
    .detail-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .detail-value {
      color: #fafafa;
      font-weight: 600;
    }
    
    /* 其他指标 */
    .other-indicators {
      border-top: 1px solid #27272a;
      padding-top: 25px;
      display: flex;
      justify-content: center;
      gap: 50px;
      font-size: 18px;
      color: #71717a;
    }
    .indicator-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .indicator-name {
      font-weight: 500;
    }
    .indicator-value {
      color: #a1a1aa;
    }
    .indicator-status {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
    }
    .indicator-status.positive { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .indicator-status.negative { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .indicator-status.neutral { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    
    /* 底部水印 */
    .footer {
      padding: 15px 40px;
      border-top: 1px solid #27272a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      color: #71717a;
    }
    .footer-link {
      color: #3b82f6;
      font-weight: 500;
    }
    
    /* 治理焦点样式 */
    .governance-focus {
      text-align: center;
    }
    .governance-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #fafafa;
    }
    .governance-detail {
      font-size: 22px;
      color: #a1a1aa;
      margin-bottom: 10px;
    }
    .governance-badge {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 600;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">📊</div>
      Crypto3D Daily
    </div>
    <div class="date" id="date"></div>
  </div>
  
  <div class="main" id="main">
    <!-- 动态内容 -->
  </div>
  
  <div class="footer">
    <span>每日加密市场晴雨表</span>
    <span class="footer-link">crypto3d.pro</span>
  </div>

  <script>
    // 数据加载
    const data = {
      date: '2026-03-19',
      focus: 'ahr999', // ahr999 | mvrv | bmri | btcd | governance
      indicators: {
        ahr999: { value: 0.3666, status: '抄底区', price: 71225, cost_200d: 93199 },
        mvrv: { value: 1.31, status: '合理区' },
        bmri: { value: 47.43, regime: 'NEUTRAL' },
        btcd: { value: 58.43, zone: 'BALANCED' }
      },
      governance: null
    };

    // 格式化日期
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 
                      'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }

    // 获取状态样式类
    function getStatusClass(status) {
      const positiveKeywords = ['抄底', '合理', 'NEUTRAL', 'BALANCED', 'LOW', 'FAIR'];
      const negativeKeywords = ['过热', 'HIGH', 'EXTREME', 'DANGER'];
      
      const statusLower = status.toLowerCase();
      if (positiveKeywords.some(k => statusLower.includes(k.toLowerCase()))) {
        return 'positive';
      }
      if (negativeKeywords.some(k => statusLower.includes(k.toLowerCase()))) {
        return 'negative';
      }
      return 'neutral';
    }

    // 渲染 AHR999
    function renderAHR999(data) {
      const ind = data.indicators.ahr999;
      const progress = Math.min(ind.value * 100, 100);
      const statusClass = getStatusClass(ind.status);
      
      return `
        <div class="focus-section">
          <div class="focus-label">🔥 AHR999 指数</div>
          <div class="focus-indicator ${statusClass}">${ind.value.toFixed(2)}</div>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill ${statusClass}" style="width: ${progress}%"></div>
            </div>
            <div class="progress-labels">
              <span>0 抄底</span>
              <span>0.75 合理</span>
              <span>1.5 过热</span>
            </div>
          </div>
          <div class="details">
            <div class="detail-item">
              BTC <span class="detail-value">$${ind.price.toLocaleString()}</span>
            </div>
            <div class="detail-item">
              200日成本 <span class="detail-value">$${ind.cost_200d.toLocaleString()}</span>
            </div>
          </div>
        </div>
      `;
    }

    // 渲染 MVRV
    function renderMVRV(data) {
      const ind = data.indicators.mvrv;
      const progress = Math.min((ind.value / 4) * 100, 100);
      const statusClass = getStatusClass(ind.status);
      
      return `
        <div class="focus-section">
          <div class="focus-label">📈 MVRV 比率</div>
          <div class="focus-indicator ${statusClass}">${ind.value.toFixed(2)}</div>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill ${statusClass}" style="width: ${progress}%"></div>
            </div>
            <div class="progress-labels">
              <span>1 低估</span>
              <span>2 合理</span>
              <span>3+ 过热</span>
            </div>
          </div>
          <div class="details">
            <div class="detail-item">
              市场状态 <span class="detail-value indicator-status ${statusClass}">${ind.status}</span>
            </div>
          </div>
        </div>
      `;
    }

    // 渲染 BMRI
    function renderBMRI(data) {
      const ind = data.indicators.bmri;
      const progress = ind.value;
      const statusClass = ind.value < 30 ? 'positive' : ind.value > 70 ? 'negative' : 'neutral';
      const statusText = ind.value < 30 ? '低风险' : ind.value > 70 ? '高风险' : '中性';
      
      return `
        <div class="focus-section">
          <div class="focus-label">⚠️ BMRI 风险指数</div>
          <div class="focus-indicator ${statusClass}">${ind.value.toFixed(1)}</div>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill ${statusClass}" style="width: ${progress}%"></div>
            </div>
            <div class="progress-labels">
              <span>0 安全</span>
              <span>50 中性</span>
              <span>100 危险</span>
            </div>
          </div>
          <div class="details">
            <div class="detail-item">
              市场体制 <span class="detail-value indicator-status ${statusClass}">${ind.regime}</span>
            </div>
          </div>
        </div>
      `;
    }

    // 渲染 BTC.D
    function renderBTCD(data) {
      const ind = data.indicators.btcd;
      const progress = ind.value;
      const statusClass = getStatusClass(ind.zone);
      const zoneText = ind.zone === 'BTC_DOMINANT' ? 'BTC 主导' : 
                       ind.zone === 'ALT_SEASON' ? '山寨季' : '平衡';
      
      return `
        <div class="focus-section">
          <div class="focus-label">₿ BTC 市值占比</div>
          <div class="focus-indicator ${statusClass}">${ind.value.toFixed(1)}%</div>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill ${statusClass}" style="width: ${progress}%"></div>
            </div>
            <div class="progress-labels">
              <span>40% 山寨季</span>
              <span>55% 平衡</span>
              <span>70% BTC 主导</span>
            </div>
          </div>
          <div class="details">
            <div class="detail-item">
              市场状态 <span class="detail-value indicator-status ${statusClass}">${zoneText}</span>
            </div>
          </div>
        </div>
      `;
    }

    // 渲染治理动态
    function renderGovernance(data) {
      const gov = data.governance;
      if (!gov) return renderAHR999(data);
      
      return `
        <div class="governance-focus">
          <div class="focus-label">🏛️ 治理动态</div>
          <div class="governance-title">${gov.protocol}</div>
          <div class="governance-detail">${gov.title}</div>
          <div class="governance-badge indicator-status ${gov.isTEV ? 'positive' : 'neutral'}">
            ${gov.isTEV ? '📊 TEV 相关' : '📋 治理提案'}
          </div>
        </div>
      `;
    }

    // 渲染其他指标
    function renderOtherIndicators(focus) {
      const indicators = [
        { key: 'ahr999', name: 'AHR999', format: d => d.indicators.ahr999.value.toFixed(2) + ' ' + d.indicators.ahr999.status },
        { key: 'mvrv', name: 'MVRV', format: d => d.indicators.mvrv.value.toFixed(2) + ' ' + d.indicators.mvrv.status },
        { key: 'bmri', name: 'BMRI', format: d => d.indicators.bmri.value.toFixed(1) + ' ' + d.indicators.bmri.regime },
        { key: 'btcd', name: 'BTC.D', format: d => d.indicators.btcd.value.toFixed(1) + '%' }
      ];
      
      const others = indicators.filter(i => i.key !== focus);
      
      return `
        <div class="other-indicators">
          ${others.map(i => `
            <div class="indicator-item">
              <span class="indicator-name">${i.name}</span>
              <span class="indicator-value">${i.format(data)}</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    // 主渲染函数
    function render() {
      document.getElementById('date').textContent = formatDate(data.date);
      
      const main = document.getElementById('main');
      let focusContent = '';
      
      switch (data.focus) {
        case 'ahr999': focusContent = renderAHR999(data); break;
        case 'mvrv': focusContent = renderMVRV(data); break;
        case 'bmri': focusContent = renderBMRI(data); break;
        case 'btcd': focusContent = renderBTCD(data); break;
        case 'governance': focusContent = renderGovernance(data); break;
        default: focusContent = renderAHR999(data);
      }
      
      main.innerHTML = focusContent + renderOtherIndicators(data.focus);
    }

    render();
  </script>
</body>
</html>
