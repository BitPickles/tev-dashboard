<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News Radar Review</title>
  <style>
    :root {
      --bg: #0a0a0d;
      --panel: #121218;
      --panel-2: #16161d;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --line: #26272f;
      --blue: #60a5fa;
      --green: #34d399;
      --orange: #f59e0b;
      --red: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b0b10 0%, #08080c 100%);
      color: var(--text);
    }
    .wrap {
      width: min(1100px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }
    .hero {
      margin-bottom: 20px;
      padding: 24px 28px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(18,18,24,0.9);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.1;
    }
    .sub {
      color: var(--muted);
      font-size: 14px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }
    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag { font-size: 12px; border-radius: 999px; padding: 6px 10px; color: white; }
    .markets { background: #2563eb; }
    .policy { background: #7c3aed; }
    .defi { background: #0891b2; }
    .macro { background: #ea580c; }
    .business { background: #059669; }
    .security { background: #dc2626; }
    .technology { background: #4f46e5; }
    .list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .card {
      padding: 18px 18px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(19,19,26,0.98), rgba(15,15,20,0.96));
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .title {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      letter-spacing: -0.02em;
    }
    .score {
      min-width: 56px;
      text-align: center;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(96,165,250,0.12);
      border: 1px solid rgba(96,165,250,0.25);
      color: var(--blue);
      font-weight: 800;
      font-size: 20px;
      line-height: 1;
    }
    .summary {
      margin: 0 0 12px;
      color: #d4d4d8;
      font-size: 15px;
      line-height: 1.7;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }
    .source, .time, .en-title {
      color: var(--muted);
      font-size: 13px;
    }
    .en-title {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #2b2c34;
      line-height: 1.5;
    }
    a.link {
      color: var(--blue);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .error {
      color: #fecaca;
      background: rgba(127,29,29,0.35);
      border: 1px solid rgba(220,38,38,0.4);
      padding: 16px;
      border-radius: 14px;
    }
    @media (max-width: 700px) {
      .wrap { width: calc(100vw - 20px); padding-top: 16px; }
      .hero { padding: 18px; }
      h1 { font-size: 26px; }
      .title { font-size: 18px; }
      .summary { font-size: 14px; }
      .top { gap: 10px; }
      .score { min-width: 48px; font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>News Radar Review</h1>
      <div class="sub">仅供 review 验收使用，不接入正式站。数据源：<code>../data/news.json</code></div>
      <div class="meta" id="meta">
        <div class="pill">加载中…</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="legend">
        <span class="tag markets">markets</span>
        <span class="tag policy">policy</span>
        <span class="tag defi">defi</span>
        <span class="tag macro">macro</span>
        <span class="tag business">business</span>
        <span class="tag security">security</span>
        <span class="tag technology">technology</span>
      </div>
    </div>

    <div id="app" class="list"></div>
  </div>

  <script>
    const app = document.getElementById('app');
    const meta = document.getElementById('meta');

    function formatTime(s) {
      try {
        const d = new Date(s);
        return d.toLocaleString('zh-CN', { hour12: false });
      } catch {
        return s || '-';
      }
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function main() {
      try {
        const res = await fetch('../data/news.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        meta.innerHTML = `
          <div class="pill">更新时间：${escapeHtml(formatTime(data.updated_at))}</div>
          <div class="pill">新闻数量：${escapeHtml(data.count)}</div>
          <div class="pill">排序：importance 降序</div>
        `;

        app.innerHTML = data.news.map((item, idx) => `
          <article class="card">
            <div class="top">
              <div>
                <h2 class="title">${idx + 1}. ${escapeHtml(item.title_zh)}</h2>
                <div class="row">
                  <span class="tag ${escapeHtml(item.category)}">${escapeHtml(item.category)}</span>
                  <span class="source">${escapeHtml(item.source)}</span>
                  <span class="time">${escapeHtml(formatTime(item.published_at))}</span>
                  <a class="link" href="${escapeHtml(item.source_url)}" target="_blank" rel="noopener noreferrer">查看原文</a>
                </div>
              </div>
              <div class="score" title="importance">${escapeHtml(item.importance)}</div>
            </div>
            <p class="summary">${escapeHtml(item.summary_zh)}</p>
            <div class="en-title">EN: ${escapeHtml(item.title_en)}</div>
          </article>
        `).join('');
      } catch (err) {
        meta.innerHTML = '<div class="pill">加载失败</div>';
        app.innerHTML = `<div class="error">无法加载 <code>../data/news.json</code><br />${escapeHtml(err.message || err)}</div>`;
      }
    }

    main();
  </script>
</body>
</html>
